name: Pitstop Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Python packages
        run: |
          pip install -r requirements.txt
          python -m ipykernel install --user --name python3

      - name: 🚀 Execute notebook
        # Chrome is gone! We just run Jupyter normally now.
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute Scrapping.ipynb \
            --output Scrapping_executed.ipynb \
            --ExecutePreprocessor.timeout=600
        env:
          CI: "true"

      - name: 📤 Commit results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🔄 Scrape API: $(date +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: 📎 Upload executed notebook
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebook
          path: Scrapping_executed.ipynb
